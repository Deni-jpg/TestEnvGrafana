# OpenTelemetry Collector — configuração completa
#
# Fluxo:
#   Apps/serviços  ──OTLP──►  receivers
#   Sistema (CPU/RAM/disco)    hostmetrics
#   Containers Docker          docker_stats
#                                 │
#                    ┌────────────┼────────────┐
#                    ▼            ▼            ▼
#                 traces       métricas      logs
#                    │            │            │
#                  Tempo     Prometheus       Loki

receivers:

  # OTLP: recebe traces, métricas e logs das tuas apps
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
        cors:
          allowed_origins: ["*"]
          
  prometheus/cadvisor:
    config:
      scrape_configs:
        - job_name: 'cadvisor'
          scrape_interval: 10s
          static_configs:
            - targets: ['cadvisor:8080']

  # Métricas do sistema operativo (substitui Node Exporter)
  # Lê diretamente /proc e /sys do host via volume mount
  hostmetrics:
    collection_interval: 15s
    scrapers:
      cpu: {}
      memory: {}
      disk: {}
      filesystem: {}
      network: {}
      load: {}
      processes: {}

  # Logs dos containers Docker
  filelog/containers:
    include:
      - /var/lib/docker/containers/*/*.log
    start_at: end
    include_file_path: true
    include_file_name: false
    operators:
      - type: json_parser
        id: parse_docker
        timestamp:
          parse_from: attributes.time
          layout: "%Y-%m-%dT%H:%M:%S.%LZ"
      - type: move
        from: attributes.log
        to: body
      - type: regex_parser
        id: extract_container
        regex: '/var/lib/docker/containers/(?P<container_id>[^/]+)/'
        parse_from: attributes["log.file.path"]
      - type: move
        from: attributes.container_id
        to: resource["container.id"]
      # Extract log severity from structured "level=LEVEL" format (fruit-stock-app)
      - type: regex_parser
        id: extract_level
        regex: 'level=(?P<level>[A-Z]+)'
        parse_from: body
        on_error: send_quiet
      - type: severity_parser
        id: set_severity
        parse_from: attributes.level
        on_error: send_quiet

processors:

  resourcedetection:
    detectors: [env, docker]
    timeout: 5s

  batch:
    timeout: 5s
    send_batch_size: 1000

  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128

  resource/logs:
    attributes:
      - action: insert
        key: loki.format
        value: json
      - action: insert
        key: loki.resource.labels
        value: container.id

exporters:

  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

  prometheusremotewrite:
    endpoint: http://prometheus:9090/api/v1/write
    tls:
      insecure_skip_verify: true

  loki:
    endpoint: http://loki:3100/loki/api/v1/push
    default_labels_enabled:
      exporter: true
      job: true
      instance: true
      level: true

  debug:
    verbosity: basic

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  pprof:
    endpoint: 0.0.0.0:1777
  zpages:
    endpoint: 0.0.0.0:55679

service:
  extensions: [health_check, pprof, zpages]

  pipelines:

    traces:
      receivers: [otlp]
      processors: [memory_limiter, resourcedetection, batch]
      exporters: [otlp/tempo, debug]

    metrics:
      receivers: [otlp, hostmetrics, prometheus/cadvisor] # Adicionado aqui
      processors: [memory_limiter, resourcedetection, batch]
      exporters: [prometheusremotewrite]

    logs:
      receivers: [otlp, filelog/containers]
      processors: [memory_limiter, resourcedetection, resource/logs, batch]
      exporters: [loki, debug]