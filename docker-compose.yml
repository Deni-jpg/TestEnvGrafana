networks:
  observability:
    driver: bridge

volumes:
  prometheus_data:
  loki_data:
  tempo_data:
  grafana_data:

services:

  # ── Grafana ──────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - observability
    depends_on:
      - prometheus
      - loki
      - tempo

  # ── Prometheus ───────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    networks:
      - observability

  # ── Loki ─────────────────────────────────────────────────────────────────────
  loki:
    image: grafana/loki:2.9.7
    container_name: loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/loki.yml
    networks:
      - observability

  # ── Tempo ────────────────────────────────────────────────────────────────────
  tempo:
    image: grafana/tempo:2.4.2
    container_name: tempo
    restart: unless-stopped
    ports:
      - "3200:3200"
    volumes:
      - ./tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo_data:/var/tempo
    command: -config.file=/etc/tempo/tempo.yml
    networks:
      - observability

  # ── OpenTelemetry Collector ───────────────────────────────────────────────────
  # Ponto central de entrada para traces, métricas e logs das tuas apps.
  # Recebe via OTLP e roteia para Tempo / Prometheus / Loki.
  otelcol:
    image: otel/opentelemetry-collector-contrib:0.100.0
    container_name: otelcol
    restart: unless-stopped
    user: "0:0"        # precisa de root para aceder ao docker.sock
    ports:
      - "4317:4317"     # OTLP gRPC  → traces, métricas, logs das apps
      - "4318:4318"     # OTLP HTTP  → traces, métricas, logs das apps
      - "8888:8888"     # métricas internas do próprio collector
      - "8889:8889"     # prometheus exporter (métricas recebidas pelo collector)
    volumes:
      - ./otelcol/otelcol.yml:/etc/otelcol/otelcol.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /proc:/hostfs/proc:ro
      - /sys:/hostfs/sys:ro
      - /:/hostfs:ro
    command: --config=/etc/otelcol/otelcol.yml
    networks:
      - observability
    depends_on:
      - prometheus
      - loki
      - tempo