global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: "demo"
    region: "local"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - 'alert_rules.yml'

# As métricas do sistema e dos containers chegam via remote write do OTel Collector.
# O Prometheus só precisa de se auto-monitorizar aqui.
scrape_configs:

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "cadvisor"
    scrape_interval: 15s
    static_configs:
      - targets: ["cadvisor:8080"]
    metric_relabel_configs:
      - source_labels: [container_label_com_docker_compose_service]
        target_label: service
      - source_labels: [container_label_com_docker_compose_project]
        target_label: project

  - job_name: "fruit-stock-app"
    scrape_interval: 5s
    static_configs:
      - targets: ["fruit-stock-app:5000"]