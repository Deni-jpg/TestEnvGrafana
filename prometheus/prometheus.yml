global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: "demo"
    region: "local"

scrape_configs:

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "grafana"
    static_configs:
      - targets: ["grafana:3000"]

  # Métricas do host e containers via OTel Collector
  - job_name: "otelcol"
    static_configs:
      - targets: ["otelcol:8889"]
