groups:
  - name: fruit-app.rules
    rules:
      - alert: Teste de alerta #teste
        expr: vector(1)
        for: 0s
        labels:
          severity: critical
        annotations:
          summary: "Alerta de teste — sempre ativo"
          description: "Este alerta existe apenas para validar que o pipeline Prometheus → Alertmanager → email está up."

      - alert: FruitAppDown
        expr: up{job="fruit-stock-app"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "FruitStore está incontactável"
          description: "O scrape do Prometheus para job 'fruit-stock-app' está a 0 por mais de 30s."

      - alert: HighErrorRate
        expr: rate(fruit_app_errors_total[2m]) > 0.1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Taxa de erros elevada na FruitStore"
          description: "Taxa de erros (2m) acima de 0.1 erros/s. Verifique logs e serviços."

      - alert: HighLatency
        expr: histogram_quantile(0.95, sum(rate(fruit_app_request_duration_seconds_bucket[2m])) by (le, endpoint)) > 1.0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Latência elevada (p95) na FruitStore"
          description: "Percentil 95 de latência maior que 1s por endpoint."